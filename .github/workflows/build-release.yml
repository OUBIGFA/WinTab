name: Build And Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use (e.g., v1.0.0)"
        required: true
        type: string
        default: "v1.0.0-test"

env:
  PROJECT_NAME: WinTab
  SIGNPATH_ORG_ID: c35b3bd9-3451-4e24-b4e0-332e901290bf
  SIGNPATH_PROJECT_SLUG: WinTab
  SIGNPATH_POLICY_SLUG: release-signing
  VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: true
      max-parallel: 3
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild environments
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "17.0"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish app
        shell: pwsh
        run: |
          $outputDir = "../publish/net9.0-windows/${{ matrix.arch }}"
          msbuild "${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj" /restore /t:Publish /p:Configuration=Release /p:TargetFramework=net9.0-windows /p:RuntimeIdentifier=win-${{ matrix.arch }} /p:SelfContained=false /p:PublishDir=$outputDir /p:DebugType=none

      - name: Upload publish output
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.arch }}
          path: publish/net9.0-windows/${{ matrix.arch }}

  build-installer:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download publish output
        uses: actions/download-artifact@v4
        with:
          name: publish-${{ matrix.arch }}
          path: publish/net9.0-windows/${{ matrix.arch }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            /DPublishRoot="..\publish\net9.0-windows" `
            /DOutputDir="..\dist" `
            /DArch="${{ matrix.arch }}" `
            "installers\installer.iss"

      - name: Check signing availability
        id: check-signing
        shell: pwsh
        run: |
          if ("${{ secrets.SIGNPATH_API_TOKEN }}") {
            "available=true" | Out-File -Append $env:GITHUB_OUTPUT
          } else {
            "available=false" | Out-File -Append $env:GITHUB_OUTPUT
            Write-Host "::warning::SIGNPATH_API_TOKEN not configured, skipping code signing"
          }

      - name: Upload unsigned installer
        id: upload-unsigned-installer
        if: steps.check-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}_${{ env.VERSION }}_${{ matrix.arch }}_Setup-unsigned
          path: dist/*.exe

      - name: Submit installer for signing
        id: submit-installer-signing
        if: steps.check-signing.outputs.available == 'true'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: single-zip-executable
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./signed-installer
          parameters: |
            version: "${{ env.VERSION }}"

      - name: Prepare final installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./final-installer | Out-Null
          if (Test-Path "./signed-installer/*.exe") {
            Copy-Item "./signed-installer/*.exe" "./final-installer/"
            Write-Host "Using signed installer"
          } else {
            Copy-Item "dist/*.exe" "./final-installer/"
            Write-Host "::warning::Using unsigned installer (SignPath not configured)"
          }

      - name: Upload final installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.arch }}
          path: ./final-installer/*.exe

  create-release:
    needs: build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate changelog
        id: generate_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: COMMIT
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## Feature",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## Fix",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|bug|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ]+)([\\s\\S]*)",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.PROJECT_NAME }} ${{ env.VERSION }}
          draft: false
          body: |
            ${{ steps.generate_changelog.outputs.changelog }}

            ## Downloads

            Pick the installer that matches your CPU architecture:

            - `${{ env.PROJECT_NAME }}_${{ env.VERSION }}_x64_Setup.exe` — 64-bit Intel/AMD (most users)
            - `${{ env.PROJECT_NAME }}_${{ env.VERSION }}_arm64_Setup.exe` — ARM64 Windows (Surface Pro X, Snapdragon laptops)
            - `${{ env.PROJECT_NAME }}_${{ env.VERSION }}_x86_Setup.exe` — 32-bit Windows
          files: |
            release-artifacts/*.exe
