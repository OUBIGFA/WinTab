name: Build And Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use (e.g., v1.0.0)"
        required: true
        type: string
        default: "v1.0.0-test"

env:
  PROJECT_NAME: WinTab
  SIGNPATH_ORG_ID: c35b3bd9-3451-4e24-b4e0-332e901290bf
  SIGNPATH_PROJECT_SLUG: WinTab
  SIGNPATH_POLICY_SLUG: release-signing
  VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: true
      max-parallel: 3
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild environments
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "17.0"

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Publish app
        shell: pwsh
        run: |
          $outputDir = "../publish/net9.0-windows/${{ matrix.arch }}"
          msbuild "${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj" /restore /t:Publish /p:Configuration=Release /p:TargetFramework=net9.0-windows /p:RuntimeIdentifier=win-${{ matrix.arch }} /p:PublishDir=$outputDir /p:DebugType=none

      - name: Upload publish output
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.arch }}
          path: publish/net9.0-windows/${{ matrix.arch }}

  build-installer:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download x64 publish output
        uses: actions/download-artifact@v4
        with:
          name: publish-x64
          path: publish/net9.0-windows/x64

      - name: Download x86 publish output
        uses: actions/download-artifact@v4
        with:
          name: publish-x86
          path: publish/net9.0-windows/x86

      - name: Download arm64 publish output
        uses: actions/download-artifact@v4
        with:
          name: publish-arm64
          path: publish/net9.0-windows/arm64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            /DPublishRoot="..\publish\net9.0-windows" `
            /DOutputDir="..\dist" `
            "installers\installer.iss"

      - name: Upload unsigned installer
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}_${{ env.VERSION }}_Setup-unsigned
          path: dist/*.exe

      - name: Submit installer for signing
        id: submit-installer-signing
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: single-zip-executable
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./signed-installer
          parameters: |
            version: "${{ env.VERSION }}"

      - name: Upload signed installer
        uses: actions/upload-artifact@v4
        with:
          name: signed-installer
          path: ./signed-installer/*.exe

  create-release:
    needs: build-installer
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download signed installer
        uses: actions/download-artifact@v4
        with:
          name: signed-installer
          path: release-artifacts

      - name: Generate changelog
        id: generate_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: COMMIT
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## Feature",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## Fix",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|bug|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ]+)([\\s\\S]*)",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.PROJECT_NAME }} ${{ env.VERSION }}
          draft: true
          body: |
            ${{ steps.generate_changelog.outputs.changelog }}

            **Note:** Most users should download `${{ env.PROJECT_NAME }}_${{ env.VERSION }}_Setup.exe`.
          files: |
            release-artifacts/*.exe
